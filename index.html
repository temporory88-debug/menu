<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Light Cafe</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
</head>

<body>
<h1>🌙 Moon Light Cafe</h1>
<p>Bhojpur-7, Bank Road</p>

<h2>⭐ Menu</h2>

<div class="card">
<h3>Moon Light Special Coffee</h3>
<p>Rs 250</p>
<button onclick="add('Moon Light Special Coffee',250)">Add</button>
</div>

<div class="card">
<h3>Moon Light Special Burger</h3>
<p>Rs 300</p>
<button onclick="add('Moon Light Special Burger',300)">Add</button>
</div>

<div class="card">
<h3>Veg Momo</h3>
<p>Rs 100</p>
<button onclick="add('Veg Momo',100)">Add</button>
</div>

<div class="card">
<h3>Chicken Momo</h3>
<p>Rs 120</p>
<button onclick="add('Chicken Momo',120)">Add</button>
</div>

<hr>

<h2>🛒 Cart</h2>

<input id="tableNo" placeholder="Table Number">

<div id="cart"></div>

<button onclick="placeOrder()">Place Order</button>

<script src="app.js"></script>
</body>
</html>
